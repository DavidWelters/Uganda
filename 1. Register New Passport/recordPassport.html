<!-- Paste into your portal page Custom HTML block -->
<form method="post" id="aspForm_13">
<script>
  document.getElementById('aspForm_13').action =
    window.location.pathname + '?handler=ASPForm&' + window.location.search.substring(1);
</script>
    <input type="hidden" name="ASPFormId" value="13" />
    <input type="hidden" id="UserToken" name="UserToken" value="$(Token)" />
    <input type="hidden" id="Base64" name="Base64" />
    <input type="hidden" id="FileExt" name="FileExt" />
    <button type="submit" id="submitBtn" class="btn btn-primary" style="display:none;">Submit</button>
</form>

<script>
document.getElementById('aspForm_13').addEventListener('submit', function (e) {
    e.preventDefault();

    const form = this;
    const formData = new FormData(form);

    fetch(form.action, {
        method: 'POST',
        body: formData
    })
    .then(function (response) {
        if (response.ok) {
            window.location.href = 'https://dev.pinpoint.web.za/Pages/Page?menuID=138';
        } else {
            console.error('Submission failed with status:', response.status);
        }
    })
    .catch(function (err) {
        console.error('Submission error:', err);
    });
});
</script>
