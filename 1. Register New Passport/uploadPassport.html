<style>
  .passport-upload-wrap {
    font-family: 'Segoe UI', sans-serif;
    max-width: 520px;
  }
  .upload-card {
    border: 2px dashed #2d6a2d;
    border-radius: 10px;
    background: #f8fdf8;
    padding: 32px 24px;
    text-align: center;
    cursor: pointer;
    transition: background 0.2s;
    position: relative;
  }
  .upload-card:hover { background: #edf7ed; }
  .upload-card.dragover { background: #d4edda; border-color: #1a4d1a; }
  .upload-card.has-file { border-style: solid; background: #edf7ed; }
  .upload-icon { font-size: 40px; margin-bottom: 8px; }
  .upload-title { font-size: 15px; font-weight: 600; color: #2d6a2d; margin: 0 0 4px; }
  .upload-sub { font-size: 12px; color: #666; margin: 0 0 14px; }
  .upload-btn {
    display: inline-block;
    background: #2d6a2d;
    color: #fff;
    border: none;
    border-radius: 6px;
    padding: 8px 22px;
    font-size: 13px;
    cursor: pointer;
    font-weight: 600;
    letter-spacing: 0.3px;
  }
  .upload-btn:hover { background: #1f4d1f; }
  #passportFileInput { display: none; }
  .file-preview {
    display: none;
    align-items: center;
    gap: 12px;
    margin-top: 16px;
    background: #fff;
    border: 1px solid #c3dfc3;
    border-radius: 8px;
    padding: 10px 14px;
  }
  .file-preview.show { display: flex; }
  .file-thumb {
    width: 52px; height: 52px;
    object-fit: cover;
    border-radius: 5px;
    border: 1px solid #ddd;
    background: #eee;
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; flex-shrink: 0;
  }
  .file-thumb img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
  .file-meta { flex: 1; text-align: left; }
  .file-name { font-size: 13px; font-weight: 600; color: #222; word-break: break-all; }
  .file-size { font-size: 11px; color: #777; margin-top: 2px; }
  .remove-btn {
    background: none; border: none; color: #c0392b;
    font-size: 18px; cursor: pointer; padding: 0 4px; line-height: 1;
  }
  .upload-error {
    display: none;
    color: #c0392b;
    background: #fdf0f0;
    border: 1px solid #f5c6cb;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: 10px;
  }
  .upload-error.show { display: block; }
  .upload-success {
    display: none;
    color: #155724;
    background: #d4edda;
    border: 1px solid #c3e6cb;
    border-radius: 6px;
    padding: 8px 12px;
    font-size: 12px;
    margin-top: 10px;
    font-weight: 600;
  }
  .upload-success.show { display: block; }

  .form-control {
    display:none;
  }
</style>

<div class="passport-upload-wrap">
  <form method="post" id="aspForm_passportUpload">
    <script>
      document.getElementById('aspForm_passportUpload').action =
        window.location.pathname + '?handler=ASPForm&' + window.location.search.substring(1);
    </script>
    <input class="form-control" type="hidden" name="ASPFormId" value="5" />
    <input class="form-control" type="hidden" name="UserEmail" id="hdn_UserEmail" value="$(Email)" />
    <input class="form-control" type="hidden" name="UUID" value=$(Token)     id="hdn_UUID"      value="$(Token)" />
    <input class="form-control" type="hidden" name="Base64"    id="hdn_Base64"    value="" />
    <input class="form-control" type="hidden" name="FileExt"   id="hdn_FileExt"   value="" />

    <!-- Drop Zone -->
    <div class="upload-card" id="uploadDropZone">
      <div class="upload-icon">📎</div>
      <p class="upload-title">Upload Passport / Identity Document</p>
      <p class="upload-sub">JPEG, JPG, PNG, BMP or PDF &nbsp;·&nbsp; Min 5 KB &nbsp;·&nbsp; Max 1 MB</p>
      <label class="upload-btn" for="passportFileInput">Browse File</label>
      <input type="file" id="passportFileInput"
             accept=".jpeg,.jpg,.png,.bmp,.pdf,image/jpeg,image/png,image/bmp,application/pdf" />
    </div>

    <!-- Preview -->
    <div class="file-preview" id="filePreview">
      <div class="file-thumb" id="fileThumb">📄</div>
      <div class="file-meta">
        <div class="file-name" id="fileName"></div>
        <div class="file-size" id="fileSize"></div>
      </div>
      <button type="button" class="remove-btn" id="removeFileBtn" title="Remove">✕</button>
    </div>

    <!-- Messages -->
    <div class="upload-error"   id="uploadError"></div>
    <div class="upload-success" id="uploadSuccess"></div>

  </form>
</div>

<script>
(function () {
  const ALLOWED_EXTS  = ['.jpeg', '.jpg', '.png', '.bmp', '.pdf'];
  const ALLOWED_TYPES = ['image/jpeg', 'image/png', 'image/bmp', 'application/pdf'];
  const MIN_BYTES     = 2 * 1024;        // 5 KB
  const MAX_BYTES     = 1 * 1024 * 1024; // 1 MB

  const dropZone   = document.getElementById('uploadDropZone');
  const fileInput  = document.getElementById('passportFileInput');
  const preview    = document.getElementById('filePreview');
  const thumb      = document.getElementById('fileThumb');
  const nameEl     = document.getElementById('fileName');
  const sizeEl     = document.getElementById('fileSize');
  const removeBtn  = document.getElementById('removeFileBtn');
  const errorEl    = document.getElementById('uploadError');
  const successEl  = document.getElementById('uploadSuccess');
  const hdnBase64  = document.getElementById('hdn_Base64');
  const hdnFileExt = document.getElementById('hdn_FileExt');
  let Extension = '';

  // ── Drag & drop ──────────────────────────────────────────────
  dropZone.addEventListener('dragover',  e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    const file = e.dataTransfer.files[0];
    if (file) processFile(file);
  });

  fileInput.addEventListener('change', () => {
    if (fileInput.files[0]) processFile(fileInput.files[0]);
  });

  removeBtn.addEventListener('click', resetUpload);

  // ── Core ─────────────────────────────────────────────────────
  function processFile(file) {
    hideMessages();
    const ext = '.' + file.name.split('.').pop().toLowerCase();

    // Validate type
    if (!ALLOWED_EXTS.includes(ext) && !ALLOWED_TYPES.includes(file.type)) {
      return showError('Invalid file type. Allowed: JPEG, JPG, PNG, BMP, PDF.');
    }
    // Validate size
    if (file.size < MIN_BYTES) {
      return showError('File is too small (minimum 5 KB).');
    }
    if (file.size > MAX_BYTES) {
      return showError('File is too large (maximum 1 MB).');
    }

    // Read as base64
    const reader = new FileReader();
    reader.onload = function (e) {
      const dataUrl    = e.target.result;              // data:image/jpeg;base64,XXXX
      const base64Pure = dataUrl.split(',')[1];        // strip the prefix — DB stores raw base64

      // Populate hidden fields
      hdnBase64.value  = base64Pure;
      hdnFileExt.value = ext;

      console.log("Setting hdn_Base64");
      console.log("Base64 length:", base64Pure.length);

      console.log("Setting hdn_FileExt to:", ext);

      // Trigger events manually
      hdnBase64.dispatchEvent(new Event('input'));
      hdnFileExt.dispatchEvent(new Event('input'));

      Extension = ext;

      // Show preview
      showPreview(file, ext, dataUrl);
      showSuccess('File ready.');
    };
    reader.onerror = () => showError('Could not read file. Please try again.');
    reader.readAsDataURL(file);
  }


  function showPreview(file, ext, dataUrl) {
    nameEl.textContent = file.name;
    sizeEl.textContent = formatBytes(file.size);
    dropZone.classList.add('has-file');
    preview.classList.add('show');

    if (['.jpeg', '.jpg', '.png', '.bmp'].includes(ext)) {
      thumb.innerHTML = '<img src="' + dataUrl + '" alt="preview" />';
    } else {
      thumb.innerHTML = '📄'; // PDF icon fallback
    }
  }

  function resetUpload() {
    fileInput.value  = '';
    hdnBase64.value  = '';
    hdnFileExt.value = '';
    preview.classList.remove('show');
    dropZone.classList.remove('has-file');
    thumb.innerHTML  = '📄';
    nameEl.textContent = '';
    sizeEl.textContent = '';
    hideMessages();
  }

  function formatBytes(bytes) {
    if (bytes < 1024)        return bytes + ' B';
    if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
    return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
  }

  function showError(msg)   { errorEl.textContent = msg; errorEl.classList.add('show'); }
  function showSuccess(msg) { successEl.textContent = msg; successEl.classList.add('show'); }
  function hideMessages()   { errorEl.classList.remove('show'); successEl.classList.remove('show'); }

  // Disable submit if base64 is empty (guard against blank submits)
  document.getElementById('aspForm_passportUpload').addEventListener('submit', function (e) {
    if (!hdnBase64.value) {
      e.preventDefault();
      showError('Please select a file before submitting.');
    }
  });
})();
</script>
