<style>
  #profile-card {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 24px;
    padding: 20px 24px;
    background: #f4f6f8;
    border-radius: 12px;
    color: #1a2233;
    font-family: sans-serif;
    min-height: 140px;
  }

  .photo-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }

  .photo-wrap {
    position: relative;
    width: 90px;
    height: 90px;
  }

  .photo-placeholder {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    z-index: 1;
  }

  #pc-photo {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    border-radius: 50%;
    object-fit: cover;
    z-index: 2;
    display: none;
  }

  #pc-badge {
    font-size: 11px;
    background: #e2e8f0;
    border: 1px solid #cbd5e1;
    padding: 3px 12px;
    border-radius: 20px;
    color: #475569;
    text-align: center;
    white-space: nowrap;
  }

  #pc-taken {
    font-size: 10px;
    color: #94a3b8;
    text-align: center;
    white-space: nowrap;
  }

  .info-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 14px 32px;
    flex: 1;
    align-content: start;
  }

  .info-item label {
    display: block;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: #94a3b8;
    margin-bottom: 3px;
    font-weight: 600;
  }

  .info-item span {
    font-size: 13px;
    color: #1e293b;
  }
</style>

<div id="profile-card">

  <div class="photo-col">
    <div class="photo-wrap">

      <svg class="photo-placeholder" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
        <circle cx="45" cy="45" r="45" fill="#cbd5e1"></circle>
        <circle cx="45" cy="34" r="16" fill="#94a3b8"></circle>
        <ellipse cx="45" cy="78" rx="25" ry="20" fill="#94a3b8"></ellipse>
      </svg>

      <img id="pc-photo" src="" alt="Photo">
    </div>

    <div id="pc-taken"></div>
    <div id="pc-badge">—</div>
  </div>

  <div class="info-grid">
    <div class="info-item"><label>Full Name</label><span id="pc-name">—</span></div>
    <div class="info-item"><label>Nationality</label><span id="pc-nationality">—</span></div>
    <div class="info-item"><label>Country of Birth</label><span id="pc-cob">—</span></div>
    <div class="info-item"><label>Email</label><span id="pc-email">—</span></div>
    <div class="info-item"><label>Date of Birth</label><span id="pc-dob">—</span></div>
    <div class="info-item"><label>Gender</label><span id="pc-gender">—</span></div>
    <div class="info-item"><label>Category</label><span id="pc-category">—</span></div>
    <div class="info-item"><label>Sub-category</label><span id="pc-subcategory">—</span></div>
  </div>

</div>

<script>
(function () {

  function getFieldValue(id) {
    var el = document.getElementById(id);
    if (!el) return "";
    var input = el.querySelector("input, select, textarea");
    if (input) return input.value.trim();
    return el.textContent.trim();
  }

  function updatePhoto() {
    var base64 = getFieldValue("q12");
    var img = document.getElementById("pc-photo");
    if (!img) return;

    if (base64 && base64.length > 0) {
      img.src = base64;
      img.style.display = "block";
    } else {
      img.src = "";
      img.style.display = "none";
    }
  }

  function updateCard() {
    document.getElementById("pc-name").textContent        = getFieldValue("q2")  || "—";
    document.getElementById("pc-nationality").textContent = getFieldValue("q3")  || "—";
    document.getElementById("pc-cob").textContent         = getFieldValue("q4")  || "—";
    document.getElementById("pc-email").textContent       = getFieldValue("q5")  || "—";
    document.getElementById("pc-dob").textContent         = getFieldValue("q6")  || "—";
    document.getElementById("pc-gender").textContent      = getFieldValue("q7")  || "—";
    document.getElementById("pc-category").textContent    = getFieldValue("q8")  || "—";
    document.getElementById("pc-subcategory").textContent = getFieldValue("q9")  || "—";
    document.getElementById("pc-badge").textContent       = getFieldValue("q10") || "—";

    var takenOn = getFieldValue("q11");
    document.getElementById("pc-taken").textContent = takenOn ? "Taken on: " + takenOn : "";

    updatePhoto();
  }

  window.updateCard = updateCard;

  function init() {
    updateCard();

    ["q2","q3","q4","q5","q6","q7","q8","q9","q10","q11"].forEach(function(id) {
      var el = document.getElementById(id);
      if (!el) return;
      var input = el.querySelector("input, select, textarea");
      if (input) input.addEventListener("change", updateCard);
    });
  }

  if (document.readyState === "loading") {
    document.addEventListener("DOMContentLoaded", function () { setTimeout(init, 500); });
  } else {
    setTimeout(init, 500);
  }

}());
</script>
